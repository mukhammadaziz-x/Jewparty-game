<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin – PDP Jewparty</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Orbitron:wght@700;900&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <style>
        body {
            overflow: auto;
        }

        .view.active {
            position: relative;
            display: flex;
            flex-direction: column;
            min-height: 100dvh;
        }

        .admin-layout {
            display: flex;
            height: calc(100dvh - 56px);
            overflow: hidden;
        }

        /* Topbar */
        .admin-topbar {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            background: rgba(5, 6, 20, .95);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            z-index: 10;
        }

        .at-logo {
            font-family: var(--f1);
            font-size: 18px;
            font-weight: 900;
        }

        /* Sidebar */
        .admin-sidebar {
            width: 280px;
            min-width: 280px;
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            background: rgba(255, 255, 255, .02);
        }

        .sidebar-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .sidebar-header h3 {
            font-size: 14px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: .08em;
            color: var(--t2);
        }

        .topic-list {
            flex: 1;
            overflow-y: auto;
        }

        .topic-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 16px;
            cursor: pointer;
            border-bottom: 1px solid rgba(255, 255, 255, .04);
            transition: var(--tr);
        }

        .topic-item:hover {
            background: rgba(255, 255, 255, .04);
        }

        .topic-item.active {
            background: rgba(99, 102, 241, .12);
            border-right: 3px solid var(--acc1);
        }

        .ti-emoji {
            font-size: 22px;
            flex-shrink: 0;
        }

        .ti-name {
            flex: 1;
            font-size: 14px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .ti-count {
            font-size: 11px;
            color: var(--t3);
        }

        .ti-actions {
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: .2s;
        }

        .topic-item:hover .ti-actions {
            opacity: 1;
        }

        .ti-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 2px 5px;
            border-radius: 4px;
            transition: .2s;
        }

        .ti-btn:hover {
            background: rgba(255, 255, 255, .1);
        }

        /* Content */
        .admin-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .content-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
        }

        .content-header h2 {
            font-size: 18px;
            font-weight: 800;
            flex: 1;
        }

        .questions-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .no-topic-msg {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex: 1;
            color: var(--t3);
            font-size: 16px;
            text-align: center;
        }

        /* Question Card */
        .q-card-admin {
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 16px;
            display: flex;
            gap: 14px;
            align-items: flex-start;
            transition: var(--tr);
        }

        .q-card-admin:hover {
            border-color: rgba(99, 102, 241, .3);
        }

        .q-pts-badge {
            font-family: var(--f1);
            font-size: 22px;
            font-weight: 700;
            color: var(--gold);
            min-width: 58px;
            text-align: center;
            border-right: 1px solid var(--border);
            padding-right: 14px;
        }

        .q-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .q-text-preview {
            font-size: 14px;
            font-weight: 600;
            color: var(--t1);
            line-height: 1.4;
        }

        .q-ans-preview {
            font-size: 13px;
            color: var(--green);
            font-weight: 600;
        }

        .q-img-preview {
            width: 50px;
            height: 40px;
            object-fit: cover;
            border-radius: 6px;
        }

        .q-actions-admin {
            display: flex;
            gap: 6px;
        }

        .qa-btn {
            background: rgba(255, 255, 255, .08);
            border: 1px solid var(--border);
            color: var(--t2);
            border-radius: 6px;
            padding: 6px 10px;
            cursor: pointer;
            font-size: 13px;
            transition: .2s;
        }

        .qa-btn:hover {
            background: rgba(255, 255, 255, .14);
            color: var(--t1);
        }

        .qa-btn.del:hover {
            background: rgba(239, 68, 68, .2);
            border-color: var(--red);
            color: var(--red);
        }

        /* Modal */
        .adm-modal-bg {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .85);
            backdrop-filter: blur(12px);
            z-index: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .adm-modal {
            background: #111327;
            border: 1px solid rgba(99, 102, 241, .4);
            border-radius: var(--rl);
            padding: 28px;
            max-width: 560px;
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            position: relative;
            animation: popIn .3s cubic-bezier(.34, 1.4, .64, 1);
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(.85)
            }

            to {
                opacity: 1;
                transform: scale(1)
            }
        }

        .adm-modal h3 {
            font-size: 20px;
            font-weight: 800;
        }

        .modal-close {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255, 255, 255, .08);
            border: none;
            color: var(--t2);
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 15px;
        }

        .modal-close:hover {
            background: rgba(239, 68, 68, .3);
            color: var(--red);
        }

        .points-row {
            display: flex;
            gap: 8px;
        }

        .pts-option {
            flex: 1;
            border: 2px solid var(--border);
            background: rgba(255, 255, 255, .04);
            border-radius: var(--rs);
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            font-family: var(--f1);
            font-size: 18px;
            color: var(--t2);
            font-weight: 700;
            transition: .2s;
        }

        .pts-option.selected {
            border-color: var(--gold);
            color: var(--gold);
            background: rgba(251, 191, 36, .08);
        }

        .image-upload-area {
            border: 2px dashed var(--border);
            border-radius: var(--r);
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: .2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .image-upload-area:hover {
            border-color: var(--acc1);
            background: rgba(99, 102, 241, .05);
        }

        .image-upload-area input {
            display: none;
        }

        .img-preview-area {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, .04);
            border-radius: var(--rs);
            padding: 10px;
        }

        .img-preview {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 6px;
        }

        .img-remove-btn {
            background: rgba(239, 68, 68, .2);
            border: 1px solid var(--red);
            color: var(--red);
            border-radius: var(--rs);
            padding: 6px 12px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
        }
    </style>
</head>

<body>
    <canvas id="bg-canvas"></canvas>
    <div id="toast" class="toast"></div>

    <div id="v-admin" class="view active">
        <!-- Topbar -->
        <div class="admin-topbar">
            <div class="at-logo"><span class="b-pdp">PDP</span><span class="b-jew">Jewparty</span> <span
                    style="color:var(--t3);font-size:13px;font-family:var(--f2);font-weight:500">Admin</span></div>
            <a href="/" class="btn btn-ghost" style="text-decoration:none;padding:8px 16px;font-size:13px">🎮 Play
                Game</a>
        </div>

        <!-- Layout -->
        <div class="admin-layout">
            <!-- Sidebar: Topics -->
            <div class="admin-sidebar">
                <div class="sidebar-header">
                    <h3>Topics</h3>
                    <button class="btn btn-accent" style="padding:6px 14px;font-size:13px" onclick="openTopicModal()">+
                        Add</button>
                </div>
                <div class="topic-list" id="topic-list"></div>
            </div>

            <!-- Content: Questions -->
            <div class="admin-content">
                <div class="content-header" id="content-header">
                    <h2 id="content-title">Select a topic</h2>
                    <div id="content-actions" class="hidden">
                        <button class="btn btn-gold" style="padding:8px 18px;font-size:13px"
                            onclick="openQuestionModal()">+ Add Question</button>
                    </div>
                </div>
                <div class="questions-area" id="questions-area">
                    <div class="no-topic-msg">
                        <div style="font-size:48px">📋</div>
                        <p>Select a topic from the left to manage its questions.</p>
                        <button class="btn btn-accent" onclick="openTopicModal()">+ Create First Topic</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ══ Topic Modal ══ -->
    <div id="topic-modal" class="adm-modal-bg hidden">
        <div class="adm-modal">
            <button class="modal-close" onclick="closeTopicModal()">✕</button>
            <h3 id="topic-modal-title">New Topic</h3>
            <div class="igroup">
                <label>Topic Name</label>
                <input id="t-name" type="text" placeholder="e.g. Space Exploration" maxlength="40" />
            </div>
            <div class="igroup">
                <label>Emoji</label>
                <input id="t-emoji" type="text" placeholder="🚀" maxlength="4" style="font-size:22px;width:80px" />
            </div>
            <button class="btn btn-accent" onclick="saveTopic()"><span>Save Topic</span>
                <div class="shimmer"></div>
            </button>
        </div>
    </div>

    <!-- ══ Question Modal ══ -->
    <div id="q-modal-admin" class="adm-modal-bg hidden">
        <div class="adm-modal">
            <button class="modal-close" onclick="closeQModal()">✕</button>
            <h3 id="q-modal-title">New Question</h3>
            <div class="igroup">
                <label>Point Value</label>
                <div class="points-row" id="pts-row">
                    <div class="pts-option selected" data-pts="100" onclick="selectPts(100)">100</div>
                    <div class="pts-option" data-pts="200" onclick="selectPts(200)">200</div>
                    <div class="pts-option" data-pts="300" onclick="selectPts(300)">300</div>
                    <div class="pts-option" data-pts="400" onclick="selectPts(400)">400</div>
                    <div class="pts-option" data-pts="500" onclick="selectPts(500)">500</div>
                </div>
            </div>
            <div class="igroup">
                <label>Question</label>
                <textarea id="q-text" rows="3" placeholder="Write your question here…"
                    style="resize:vertical"></textarea>
            </div>
            <div class="igroup">
                <label>Answer</label>
                <input id="q-answer" type="text" placeholder="Correct answer" />
            </div>
            <div class="igroup">
                <label>Image (optional)</label>
                <div class="image-upload-area" id="img-drop-area" onclick="document.getElementById('img-file').click()">
                    <input type="file" id="img-file" accept="image/*" onchange="handleImageUpload(event)" />
                    <div style="font-size:32px">📷</div>
                    <p style="font-size:13px;color:var(--t2)">Click to upload image (JPG, PNG, GIF, WebP)</p>
                </div>
                <div id="img-preview-area" class="img-preview-area hidden">
                    <img id="img-preview" class="img-preview" src="" alt="Preview" />
                    <div style="flex:1">
                        <div id="img-filename" style="font-size:13px;color:var(--t2)"></div>
                    </div>
                    <button class="img-remove-btn" onclick="removeImage()">✕ Remove</button>
                </div>
            </div>
            <button class="btn btn-gold" onclick="saveQuestion()"><span>Save Question</span>
                <div class="shimmer"></div>
            </button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>

</html>
